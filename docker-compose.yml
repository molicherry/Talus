# docker-compose.yml — Production deployment
# Usage: docker compose up -d
#
# 1. Set secrets in .env or export:
#    DB_PASSWORD=<your-password>
#    VPSMANAGER_MASTER_KEY=$(openssl rand -hex 32)
#    JWT_SECRET=$(openssl rand -hex 32)
#
# 2. Login to GHCR:
#    docker login ghcr.io -u <username> -p <token>
#
# 3. Start:
#    docker compose up -d

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: vpsmanager
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: vpsmanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpsmanager"]
      interval: 5s
      timeout: 5s
      retries: 5

  hub:
    image: ghcr.io/molicherry/talus:latest
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://vpsmanager:${DB_PASSWORD}@db:5432/vpsmanager?sslmode=disable
      VPSMANAGER_MASTER_KEY: ${VPSMANAGER_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "${PORT:-8080}"
      LOG_FORMAT: json
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      MONITOR_INTERVAL: "${MONITOR_INTERVAL:-60}"
      SSH_TIMEOUT: "${SSH_TIMEOUT:-10}"
      EXEC_TIMEOUT: "${EXEC_TIMEOUT:-30}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
